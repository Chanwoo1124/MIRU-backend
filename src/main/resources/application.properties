server.address=0.0.0.0
server.port=8080


# 2. ???? ?? (??? ??)
spring.application.name=miru-backend

# 3. H2 데이터베이스 설정 (개발용 - 활성화)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

## 4. JPA 설정 (DB 스키마 자동 관리)
spring.jpa.hibernate.ddl-auto=update
## 실행되는 SQL을 콘솔에 출력
spring.jpa.show-sql=true
## SQL을 보기 좋게 포맷팅
spring.jpa.properties.hibernate.format_sql=true

# mySQL 설정 (프로덕션 환경용 - 비활성화)
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.datasource.url=${DB_URL}
#spring.datasource.username=${DB_USERNAME}
#spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# OAuth2 설정 (구글만 사용)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.client-name=google
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.scope=profile,email

# 프론트엔드 URL
app.frontend-url=http://192.168.0.4.nip.io:3000

# 관리자 구글 계정 ID (로그인 시 자동으로 ADMIN 권한 부여)
app.admin-google-ids=${ADMIN_GOOGLE_IDS}

server.servlet.session.timeout=7200s
server.servlet.session.cookie.max-age=7200
server.servlet.session.cookie.domain=nip.io
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.session.store-type: none